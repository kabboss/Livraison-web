<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEND 2.0 — Livraison Nouvelle Génération | Burkina Faso</title>
    <meta name="description" content="Solution de livraison innovante pour le Burkina Faso. Expédiez et recevez vos colis en toute simplicité avec SEND 2.0.">
    <meta name="theme-color" content="#0066FF">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="img/moto.png">

    <style>
        :root {
            --blue: #0A6FFF;
            --blue-glow: rgba(10, 111, 255, 0.5);
            --cyan: #00D4FF;
            --green: #00FF88;
            --orange: #FF6B35;
            --gold: #FFB800;
            --purple: #8B5CF6;
            --bg: #060810;
            --text: #FFFFFF;
            --text-sub: rgba(255,255,255,0.6);
            --radius: 20px;
            --radius-lg: 28px;
            --radius-full: 9999px;
            --font: 'Space Grotesk', 'Inter', sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out: cubic-bezier(0, 0.55, 0.45, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            height: 100dvh;
        }

        /* ─── FOND MONUMENT AVEC EFFET GLACE ─── */
        .bg-monument {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg-monument .monument-img {
            position: absolute;
            inset: 0;
            background: url('img/Monument des martyrs.jpg') center/cover no-repeat;
            opacity: 0.85;
            filter: brightness(0.7) contrast(1.05);
            animation: monumentFloat 60s ease-in-out infinite alternate;
            will-change: transform;
        }
        @keyframes monumentFloat {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.12) rotate(1deg); }
        }
        .bg-monument .frost-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(6,8,16,0.1) 0%, rgba(6,8,16,0.2) 40%, rgba(6,8,16,0.35) 100%);
        }
        .bg-monument .light-rays {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 50% 70% at 15% 15%, rgba(10,111,255,0.2) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 80% 75%, rgba(0,212,255,0.15) 0%, transparent 50%),
                radial-gradient(ellipse 35% 45% at 50% 40%, rgba(139,92,246,0.1) 0%, transparent 50%),
                radial-gradient(ellipse 30% 35% at 60% 20%, rgba(255,184,0,0.06) 0%, transparent 50%);
        }

        /* ─── OVERLAY PRINCIPAL ─── */
        .app-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s var(--ease);
        }        
        .app-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ─── MASCOTTE ─── */
        .mascot-zone {
            position: absolute;
            top: max(16px, env(safe-area-inset-top, 16px));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
            animation: mascotEntry 1s var(--ease-spring) both;
        }
        @keyframes mascotEntry {
            0% { transform: translateY(-100px) scale(0.4); opacity: 0; filter: blur(15px); }
            100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
        }
        .mascot-ring {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .mascot-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--blue), var(--cyan), var(--purple), var(--gold), var(--blue));
            animation: ringSpin 6s linear infinite;
            filter: blur(6px);
            opacity: 0.8;
        }
        .mascot-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--bg);
            z-index: 1;
        }
        @keyframes ringSpin {
            to { transform: rotate(360deg); }
        }
        .mascot-avatar {
            position: relative;
            z-index: 2;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.15);
            animation: mascotBreathe 4s ease-in-out infinite;
            box-shadow: 
                0 15px 40px rgba(0,0,0,0.5),
                0 0 30px var(--blue-glow),
                inset 0 0 25px rgba(255,255,255,0.04);
            transition: all 0.3s var(--ease);
        }
        .mascot-avatar.talking { animation: mascotTalk 0.3s ease-in-out infinite alternate; box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 50px rgba(255,184,0,0.7); }
        .mascot-avatar.excited { animation: mascotExcited 0.35s ease-in-out infinite; box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 60px rgba(0,255,136,0.7); }
        @keyframes mascotBreathe {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.04); }
        }
        @keyframes mascotTalk {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-4px) scale(1.03); }
        }
        @keyframes mascotExcited {
            0%,100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.08) rotate(3deg); }
            75% { transform: scale(1.08) rotate(-3deg); }
        }
        .mascot-badge {
            background: linear-gradient(135deg, var(--gold), #E08A10);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: var(--radius-full);
            box-shadow: 0 4px 20px rgba(255,184,0,0.5);
            animation: badgePulse 2.5s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%,100% { box-shadow: 0 4px 20px rgba(255,184,0,0.5); }
            50% { box-shadow: 0 4px 35px rgba(255,184,0,0.9); }
        }

        /* ─── BULLE DE DIALOGUE ─── */
        .speech-bubble {
            position: absolute;
            top: calc(max(16px, env(safe-area-inset-top, 16px)) + 130px);
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 370px;
            background: rgba(12, 17, 35, 0.88);
            backdrop-filter: blur(50px) saturate(2.5);
            -webkit-backdrop-filter: blur(50px) saturate(2.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            z-index: 11;
            animation: bubbleIn 0.5s 0.3s var(--ease-spring) both;
            box-shadow: 
                0 25px 70px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,255,255,0.02),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 14px solid rgba(12, 17, 35, 0.88);
            filter: drop-shadow(0 -1px 0 rgba(255,255,255,0.1));
        }
        @keyframes bubbleIn {
            0% { transform: translateX(-50%) translateY(25px) scale(0.85); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        }
        .speech-text {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255,255,255,0.96);
            font-weight: 500;
            letter-spacing: 0.15px;
            min-height: 18px;
        }
        .speech-cursor {
            display: inline-block;
            width: 2px;
            height: 15px;
            background: var(--cyan);
            margin-left: 2px;
            vertical-align: middle;
            animation: cursorPulse 0.65s steps(1) infinite;
            border-radius: 2px;
            box-shadow: 0 0 12px var(--cyan);
        }
        @keyframes cursorPulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ─── CARTE PRINCIPALE ─── */
        .main-card {
            width: 100%;
            max-width: 460px;
            max-height: 70vh;
            background: rgba(10, 14, 28, 0.35);
            backdrop-filter: blur(10px) saturate(1.2);
            -webkit-backdrop-filter: blur(10px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 
                0 15px 70px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.01),
                inset 0 2px 0 rgba(255,255,255,0.02);
            animation: cardSlideUp 0.7s 0.5s var(--ease-out) both;
            margin: 20px;
            position: relative;
            margin-top: calc(max(16px, env(safe-area-inset-top, 16px)) + 220px);
        }        
        @keyframes cardSlideUp {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .glass-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: #fff;
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            transition: all 0.3s var(--ease);
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.22); }
        .glass-input:focus {
            border-color: var(--blue);
            background: rgba(10,111,255,0.06);
            box-shadow: 0 0 0 4px rgba(10,111,255,0.1);
        }
        .btn-send {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: 0 6px 25px rgba(10,111,255,0.45);
            transition: all 0.3s var(--ease-spring);
            white-space: nowrap;
        }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(10,111,255,0.65); }
        .btn-send:active { transform: scale(0.93); }

        /* ─── ACTIONS ─── */
        .actions-zone {
            flex: 1;
            padding: 4px 20px 20px;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: all 0.45s var(--ease-spring);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .actions-zone.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }
        .actions-scroll {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding: 2px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .actions-scroll::-webkit-scrollbar { display: none; }

        /* ─── BOUTON ACTION ─── */
        .action-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 17px 20px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            color: #fff;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.45s var(--ease);
            text-align: left;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            opacity: 0;
            transform: translateY(18px) scale(0.97);
        }
        .action-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .action-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.45s var(--ease);
            z-index: 0;
        }
        .action-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: left 0.55s var(--ease);
            z-index: 1;
            pointer-events: none;
        }
        .action-card:hover::before { opacity: 1; }
        .action-card:hover::after { left: 100%; }
        .action-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 20px 50px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .action-card:active { transform: scale(0.95); }

        .action-card.priority {
            padding: 21px 22px;
            min-height: 98px;
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }      
        
        .action-card.priority .ac-icon {
            width: 56px;
            height: 56px;
            font-size: 25px;
            border-radius: 19px;
        }
        .action-card.priority .ac-title { font-size: 17px; font-weight: 700; }
        .action-card.priority .ac-desc { font-size: 12px; }

        .ac-icon {
            position: relative;
            z-index: 2;
            width: 46px;
            height: 46px;
            border-radius: 15px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            flex-shrink: 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
            transition: all 0.35s var(--ease-spring);
        }
        .action-card:hover .ac-icon {
            transform: scale(1.12) rotate(4deg);
            box-shadow: 0 12px 35px rgba(0,0,0,0.45);
        }
        .ac-text { position: relative; z-index: 2; flex: 1; }
        .ac-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.1px; }
        .ac-desc { font-size: 11px; color: var(--text-sub); font-weight: 500; }
        .ac-arrow {
            position: relative;
            z-index: 2;
            color: rgba(255,255,255,0.18);
            font-size: 13px;
            transition: all 0.35s var(--ease);
        }
        .action-card:hover .ac-arrow {
            transform: translateX(5px);
            color: rgba(255,255,255,0.85);
        }

        /* Gradients */
        .g-blue { --gradient: linear-gradient(135deg, #0A6FFF, #00D4FF); }
        .g-green { --gradient: linear-gradient(135deg, #00D48E, #38ef7d); }
        .g-orange { --gradient: linear-gradient(135deg, #FF6B35, #FF9500); }
        .g-teal { --gradient: linear-gradient(135deg, #00B4D8, #0096C7); }
        .g-amber { --gradient: linear-gradient(135deg, #FFB800, #E08A10); }
        .g-purple { --gradient: linear-gradient(135deg, #8B5CF6, #A78BFA); }
        .g-emerald { --gradient: linear-gradient(135deg, #059669, #34D399); }
        .g-gold { --gradient: linear-gradient(135deg, #FFB800, #FF8C00); }
        .g-pink { --gradient: linear-gradient(135deg, #EC4899, #F472B6); }
        .g-indigo { --gradient: linear-gradient(135deg, #6366F1, #818CF8); }
        .g-rose { --gradient: linear-gradient(135deg, #F43F5E, #FB7185); }

        /* Skip button */
        .skip-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-full);
            color: var(--text-sub);
            font-family: var(--font);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            flex-shrink: 0;
            align-self: center;
        }
        .skip-chip:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* Scroll hint */
        .scroll-hint {
            text-align: center;
            padding: 8px;
            color: rgba(255,255,255,0.25);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            flex-shrink: 0;
            transition: opacity 0.5s;
        }
        .scroll-hint i {
            animation: hintBounce 1.8s ease-in-out infinite;
            margin: 0 6px;
        }
        @keyframes hintBounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        @media (min-width: 540px) {
            .main-card {
                max-width: 460px;
                border-radius: var(--radius-lg);
                max-height: 62vh;
                margin: 20px;
            }
            .speech-bubble { max-width: 400px; }
            .mascot-ring { width: 120px; height: 120px; }
            .mascot-avatar { width: 120px; height: 120px; }
            .speech-bubble { top: calc(max(16px, env(safe-area-inset-top, 16px)) + 155px); }
        }

        /* ─── CARTE NOM ─── */
        .name-card {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 20;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            pointer-events: none;
            transition: all 0.5s var(--ease-spring);
        }
        .name-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }
        .name-card-inner {
            background: rgba(15, 20, 40, 0.8);
            backdrop-filter: blur(30px) saturate(2);
            -webkit-backdrop-filter: blur(30px) saturate(2);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .name-card-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 12px;
            letter-spacing: 0.2px;
            text-align: center;
        }
        .name-input-row {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="bg-monument">
        <div class="monument-img"></div>
        <div class="frost-overlay"></div>
        <div class="light-rays"></div>
    </div>

    <div class="app-overlay active" id="appOverlay">
        <div class="mascot-zone">
            <div class="mascot-ring">
                <img src="img/FycCzIJUUS.gif" alt="SEND 2.0" class="mascot-avatar" id="mascotAvatar">
            </div>
        </div>

        <div class="speech-bubble" id="speechBubble">
            <span class="speech-text" id="speechText"></span>
            <span class="speech-cursor" id="speechCursor"></span>
        </div>

        <div class="main-card" id="mainCard">
            <div class="actions-zone" id="actionsZone">
                <div class="actions-scroll" id="actionsScroll"></div>
            </div>
        </div>

        <div class="name-card" id="nameCard">
            <div class="name-card-inner">
                <div class="name-card-label">Comment puis-je vous appeler ?</div>
                <div class="name-input-row">
                    <input class="glass-input" id="nameInput" type="text" placeholder="Votre prénom..." maxlength="32">
                    <button class="btn-send" id="nameSubmit"><i class="fas fa-paper-plane"></i> OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (() => {
        const $ = id => document.getElementById(id);
        const overlay = $('appOverlay');
        const avatar = $('mascotAvatar');
        const speechText = $('speechText');
        const speechCursor = $('speechCursor');
        const nameCard = $('nameCard');
        const nameInput = $('nameInput');
        const nameSubmit = $('nameSubmit');
        const actionsZone = $('actionsZone');
        const actionsScroll = $('actionsScroll');

        let userName = localStorage.getItem('send2_name') || '';
        let isPresenting = false;
        let typingAbort = null;

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function setAvatarState(s) {
            avatar.classList.remove('talking','excited');
            if (s !== 'neutral') avatar.classList.add(s);
        }

        async function typeText(text, speed = 18) {
            if (typingAbort) typingAbort();
            let aborted = false;
            typingAbort = () => { aborted = true; };
            speechText.textContent = '';
            speechCursor.style.display = 'inline-block';
            setAvatarState('talking');
            for (const ch of text) {
                if (aborted) break;
                speechText.textContent += ch;
                const pause = /[.!?\n]/.test(ch) ? 150 : /[,;:]/.test(ch) ? 55 : speed + Math.random() * 6;
                await sleep(pause);
            }
            if (!aborted) {
                setAvatarState('neutral');
                speechCursor.style.display = 'none';
            }
            typingAbort = null;
        }

        function showInput() {
            nameCard.classList.add('show');
            setTimeout(() => nameInput.focus(), 120);
        }
        function hideInput() { nameCard.classList.remove('show'); }

        function hideActions() {
            const cards = actionsScroll.querySelectorAll('.action-card, .skip-chip');
            cards.forEach(c => { c.style.opacity = '0'; c.style.transform = 'translateY(18px) scale(0.97)'; });
            setTimeout(() => {
                actionsZone.classList.remove('show');
                actionsScroll.innerHTML = '';
                isPresenting = false;
            }, 280);
        }

        // ─── LISTE COMPLÈTE DES ACTIONS (10 au total) ───
        const allActions = [
            { icon: 'fa-paper-plane', label: 'Expédier un colis', desc: 'Envoi rapide & sécurisé', gradient: 'g-blue', action: 'expedier' },
            { icon: 'fa-box-open', label: 'Recevoir un colis', desc: 'Suivi de livraison', gradient: 'g-green', action: 'recevoir' },
            { icon: 'fa-map-pin', label: 'Suivre mon colis', desc: 'Tracking GPS en direct', gradient: 'g-teal', action: 'suivre' },
            { icon: 'fa-utensils', label: 'Commander à manger', desc: 'Restaurants partenaires', gradient: 'g-orange', action: 'nourriture' },
            { icon: 'fa-store', label: 'Ajouter mon restaurant', desc: 'Devenir partenaire', gradient: 'g-pink', action: 'ajouter_restaurant' },
            { icon: 'fa-pills', label: 'Pharmacie', desc: 'Médicaments à domicile', gradient: 'g-emerald', action: 'pharmacie' },
            { icon: 'fa-basket-shopping', label: 'Faire ses courses', desc: 'Supérette & marché', gradient: 'g-amber', action: 'courses' },
            { icon: 'fa-motorcycle', label: 'Devenir livreur', desc: 'Rejoindre la flotte', gradient: 'g-indigo', action: 'devenir_livreur' },
            { icon: 'fa-headset', label: 'Assistance', desc: 'Aide & support client', gradient: 'g-purple', action: 'assistance' },
            { icon: 'fa-star', label: 'Visite guidée', desc: 'Découvrir tous les services', gradient: 'g-gold', action: 'visite_guidee' },
        ];

        function createActionCard(action, isPriority = false, delay = 0) {
            const card = document.createElement('button');
            card.className = `action-card ${action.gradient} ${isPriority ? 'priority' : ''}`;
            card.style.transitionDelay = `${delay}ms`;
            card.innerHTML = `
                <div class="ac-icon"><i class="fas ${action.icon}"></i></div>
                <div class="ac-text">
                    <div class="ac-title">${action.label}</div>
                    <div class="ac-desc">${action.desc}</div>
                </div>
                <i class="fas fa-chevron-right ac-arrow"></i>
            `;
            card.addEventListener('click', () => handleAction(action.action));
            return card;
        }

        async function presentationGuided() {
            isPresenting = true;
            setAvatarState('excited');

            const skipChip = document.createElement('button');
            skipChip.className = 'skip-chip';
            skipChip.innerHTML = '<i class="fas fa-forward"></i> Passer la présentation';
            skipChip.addEventListener('click', async () => {
                isPresenting = false;
                hideActions();
                await typeText("D'accord ! Voici tous nos services.", 15);
                await sleep(200);
                showAllButtons();
            });
            actionsScroll.appendChild(skipChip);
            actionsZone.classList.add('show');

            const msgs = {
                expedier: "Expédiez vos colis en toute sécurité partout au Burkina Faso ! 🚀",
                recevoir: "Recevez vos colis et suivez chaque livraison en temps réel ! 📦",
                suivre: "Localisez votre colis sur une carte GPS interactive ! 📍",
                nourriture: "Commandez vos plats préférés, livrés en express ! 🍕",
                ajouter_restaurant: "Vous avez un restaurant ? Rejoignez notre plateforme ! 🏪",
                pharmacie: "Vos médicaments livrés à domicile en toute sécurité ! 💊",
                courses: "Faites vos courses sans bouger, on s'occupe de tout ! 🛒",
                devenir_livreur: "Rejoignez notre flotte de livreurs et gagnez de l'argent ! 🏍️",
                assistance: "Notre équipe est disponible 7j/7 pour vous aider ! 🎧",
                visite_guidee: "Je vous fais découvrir tous nos services en détail ! ⭐",
            };

            // On présente les 10 services un par un
            for (let i = 0; i < allActions.length; i++) {
                if (!isPresenting) return;
                const action = allActions[i];
                const card = createActionCard(action, true, 0);
                card.style.padding = '22px 20px';
                card.style.minHeight = '100px';
                card.querySelector('.ac-icon').style.cssText = 'width:56px;height:56px;font-size:26px;border-radius:20px;';
                card.querySelector('.ac-title').style.fontSize = '17px';
                card.style.opacity = '1';
                card.style.transform = 'none';
                card.addEventListener('click', () => handleAction(action.action));

                actionsScroll.innerHTML = '';
                actionsScroll.appendChild(skipChip);
                actionsScroll.appendChild(card);

                await typeText(msgs[action.action], 15);
                await sleep(1600);
            }

            if (isPresenting) {
                isPresenting = false;
                hideActions();
                await typeText("Et voilà ! Tous nos services sont à votre disposition ! ✨", 15);
                await sleep(300);
                showAllButtons();
            }
        }

        function showAllButtons() {
            actionsScroll.innerHTML = '';

            // Afficher toutes les actions sans la visite guidée en priorité
            const actionsToShow = allActions.filter(a => a.action !== 'visite_guidee');
            
            actionsToShow.forEach((action, i) => {
                const isPriority = i < 4; // Les 4 premiers en priorité
                const card = createActionCard(action, isPriority, i * 50);
                actionsScroll.appendChild(card);
                setTimeout(() => card.classList.add('show'), 40 + i * 50);
            });

            // Ajouter la visite guidée à la fin
            const visiteAction = allActions.find(a => a.action === 'visite_guidee');
            if (visiteAction) {
                const card = createActionCard(visiteAction, false, actionsToShow.length * 50);
                actionsScroll.appendChild(card);
                setTimeout(() => card.classList.add('show'), 40 + actionsToShow.length * 50);
            }

            // Indice de défilement
            if (allActions.length > 4) {
                const hint = document.createElement('div');
                hint.className = 'scroll-hint';
                hint.innerHTML = '<i class="fas fa-chevron-down"></i> Défiler pour plus de services <i class="fas fa-chevron-down"></i>';
                hint.id = 'scrollHint';
                actionsScroll.appendChild(hint);
                actionsScroll.addEventListener('scroll', () => {
                    const atBottom = actionsScroll.scrollHeight - actionsScroll.scrollTop - actionsScroll.clientHeight < 40;
                    hint.style.opacity = atBottom ? '0' : '1';
                }, { passive: true });
            }

            actionsZone.classList.add('show');
            actionsScroll.scrollTop = 0;
        }

        async function handleAction(action) {
            const msgs = {
                expedier: "Direction l'expédition ! 🚀",
                recevoir: "Vos livraisons arrivent ! 📦",
                suivre: "Localisation en cours... 📍",
                nourriture: "Bon appétit ! 🍕",
                ajouter_restaurant: "Bienvenue partenaire ! 🏪",
                pharmacie: "Livraison santé en route ! 💊",
                courses: "Vos courses arrivent ! 🛒",
                devenir_livreur: "En route vers de nouveaux gains ! 🏍️",
                assistance: "On s'occupe de vous ! 🎧",
                visite_guidee: "C'est parti pour la visite guidée ! ⭐",
            };
            
            const pages = {
                expedier: 'expediteur.html',
                recevoir: 'client.html',
                suivre: 'suivi.html',
                nourriture: 'services.html#food',
                ajouter_restaurant: 'inscription_restau.html',
                pharmacie: 'services.html#pharmacy',
                courses: 'services.html#shopping',
                devenir_livreur: 'inscription.html',
                assistance: 'assistance.html',
                visite_guidee: '#',
            };

            // Gestion spéciale pour la visite guidée
            if (action === 'visite_guidee') {
                hideActions();
                setAvatarState('excited');
                await typeText("C'est parti pour la visite guidée ! 🎉", 15);
                await sleep(300);
                presentationGuided();
                return;
            }

            hideActions();
            setAvatarState('excited');
            await typeText(msgs[action] + " Redirection...", 12);
            await sleep(800);
            
            if (pages[action] && pages[action] !== '#') {
                window.location.href = pages[action];
            }
        }

        async function start() {
            overlay.classList.add('active');
            await sleep(500);
            if (userName) {
                const h = new Date().getHours();
                const greet = h < 12 ? 'Bonjour' : h < 18 ? "Bon après-midi" : 'Bonsoir';
                setAvatarState('excited');
                await typeText(`${greet} ${userName} ! Ravi de vous revoir ! `);
                await sleep(250);
                setAvatarState('neutral');
                await typeText("Que souhaitez-vous faire aujourd'hui ? Découvrez tous nos services !");
                showAllButtons();
            } else {
                setAvatarState('excited');
                await typeText("Bienvenue sur SEND 2.0 !\nVotre assistant livraison au Burkina Faso.\nComment puis-je vous appeler ?");
                showInput();
            }
        }

        async function handleNameSubmit() {
            const val = nameInput.value.trim();
            if (val.length < 2) {
                nameInput.style.borderColor = '#FF3B5C';
                nameInput.focus();
                setTimeout(() => nameInput.style.borderColor = '', 1200);
                return;
            }
            userName = val;
            localStorage.setItem('send2_name', val);
            hideInput();
            setAvatarState('excited');
            await typeText(`Enchanté, ${val} ! \nLivraison express · Suivi temps réel · Paiement sécurisé.`);
            await sleep(350);
            setAvatarState('neutral');
            await typeText("Que souhaitez-vous faire ?");
            presentationGuided();
        }

        nameSubmit.addEventListener('click', handleNameSubmit);
        nameInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleNameSubmit(); });

        start();
    })();
    </script>
</body>
</html>
